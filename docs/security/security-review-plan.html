              {value}
            </div>
            {sub && <div className="mt-0.5 text-xs text-slate-500">{sub}</div>}
          </div>
        );
      }
      function Card({ it, mode }) {
        const [open, setOpen] = useState(false);
        const tone = TONES[it.tone];
        const h = get(mode, it);
        const saved = it.solo - it.claude;
        const speed = it.claude > 0 ? it.solo / it.claude : 1;
        return (
          <div
            className={
              'border-line bg-panel rounded-xl border transition-all ' +
              (open ? 'ring-1 ' + tone.ring : 'hover:border-slate-600')
            }
          >
            <button
              onClick={() => setOpen(!open)}
              className="flex w-full items-center gap-3 px-4 py-3 text-left"
            >
              <span className={'h-2.5 w-2.5 shrink-0 rounded-full ' + tone.dot}></span>
              <div className="min-w-0 flex-1">
                <div className="flex flex-wrap items-center gap-2">
                  <span className="font-semibold text-slate-100">{it.id}</span>
                  <span className="text-slate-300">{it.title}</span>
                </div>
                <div className="mt-0.5 text-xs text-slate-500">
                  {KIND[it.kind]} · {it.owner}
                </div>
              </div>
              <div className="shrink-0 text-right">
                <div className="text-lg font-semibold tabular-nums text-slate-100">{hrs(h)}</div>
                {mode === 'claude' && saved > 0 ? (
                  <div className="text-claude text-[11px] font-medium">
                    ✦ −{hrs(saved)} · {speed.toFixed(1)}×
                  </div>
                ) : (
                  <div className="text-[11px] text-slate-600">
                    {it.kind === 'ops' ? 'ops' : 'est.'}
                  </div>
                )}
              </div>
              <span className={'text-slate-500 transition-transform ' + (open ? 'rotate-90' : '')}>
                ›
              </span>
            </button>
            {open && (
              <div className="fade-in border-line/60 border-t px-4 pb-4 pt-2">
                <p className="text-sm leading-relaxed text-slate-300">{it.what}</p>
                <p className="mt-2 text-sm leading-relaxed text-slate-500">
                  <span className="font-medium text-slate-400">Why: </span>
                  {it.why}
                </p>
                <div className="mt-3 rounded-lg border border-emerald-500/20 bg-emerald-500/5 px-3 py-2 text-sm text-emerald-200/90">
                  <span className="font-medium text-emerald-400">Done when: </span>
                  {it.done}
                </div>
                <div className="mt-3">
                  <div className="mb-1 text-[11px] uppercase tracking-wider text-slate-500">
                    Start here
                  </div>
                  <div className="flex flex-wrap gap-1.5">
                    {it.files.map((f, i) => (
                      <span
                        key={i}
                        className="bg-panel2 border-line/60 rounded border px-2 py-1 font-mono text-[12px] text-sky-300/90"
                      >
                        {f}
                      </span>
                    ))}
                  </div>
                </div>
                <div className="border-line/60 mt-3 flex items-center gap-4 border-t pt-3 text-xs text-slate-500">
                  <span>
                    Needs first: <b className="text-slate-300">{it.deps.join(', ')}</b>
                  </span>
                  <span className="ml-auto">
                    alone <b className="text-slate-300">{hrs(it.solo)}</b>
                  </span>
                  <span className="text-claude">
                    ✦ +Claude <b>{hrs(it.claude)}</b>
                  </span>
                </div>
              </div>
            )}
          </div>
        );
      }

      /* cost-only diagram */
      function Box({ tone, tag, children, dim }) {
        const t = TONES[tone] || { edge: 'border-line', dot: 'bg-slate-400' };
        return (
          <div
            className={
              'bg-panel2 rounded-lg border px-3 py-2 text-sm ' +
              (dim ? 'border-line text-slate-400' : t.edge + ' text-slate-200')
            }
          >
            {tag && (
              <div
                className={
                  'mb-0.5 text-[10px] font-semibold uppercase tracking-wide ' +
                  (dim ? 'text-slate-600' : t.txt)
                }
              >
                {tag}
              </div>
            )}
            {children}
          </div>
        );
      }
      const Arrow = ({ label }) => (
        <div className="flex shrink-0 flex-col items-center justify-center px-1 text-slate-600">
          <div className="whitespace-nowrap text-[10px] text-slate-500">{label}</div>
          <div className="text-lg leading-none">→</div>
        </div>
      );
      function CostDiagram() {
        return (
          <div className="border-line bg-panel mb-5 rounded-2xl border p-5">
            <h3 className="mb-4 text-sm font-semibold text-slate-300">How the fix fits together</h3>
            <div className="space-y-4">
              <div className="flex flex-wrap items-stretch gap-1">
                <Box dim>Phone app</Box>
                <Arrow label="can I start? (PR-C)" />
                <Box tone="amber" tag="PR-C">
                  Server says yes / no
                </Box>
              </div>
              <div className="flex flex-wrap items-stretch gap-1">
                <Box dim>Phone app</Box>
                <Arrow label="voice" />
                <Box dim>Vapi</Box>
                <Arrow label="call started (PR-B)" />
                <Box tone="red" tag="PR-B">
                  Server ends it if over limit
                </Box>
              </div>
              <div className="flex flex-wrap items-stretch gap-1">
                <Box dim>Chat · speech · text-to-speech (PR-D)</Box>
                <Arrow label="count" />
                <Box tone="emerald" tag="PR-A">
                  One usage counter in the DB
                </Box>
              </div>
              <div className="rounded-lg border border-rose-500/30 bg-rose-500/5 px-3 py-2 text-sm text-slate-300">
                <span className="font-semibold text-rose-300">PR-0 · Vapi spend cap</span> — the
                hard ceiling, stops even the skip-the-app case.
              </div>
            </div>
          </div>
        );
      }

      /* ─────────── tab content ─────────── */
      function AreaView({ area, mode }) {
        const sub = areaTotal(area, mode);
        const t = TONES[area.sevTone];
        return (
          <div className="fade-in">
            <div className="mb-4 flex items-start gap-3">
              <div className="flex-1">
                <div className="mb-1 flex items-center gap-2">
                  <span className={'rounded-full border px-2 py-0.5 text-[11px] ' + t.chip}>
                    {area.sev}
                  </span>
                  <h2 className="text-xl font-bold text-slate-50">{area.title}</h2>
                </div>
                <p className="text-sm text-slate-400">{area.reach}</p>
              </div>
              <div className="shrink-0 text-right">
                <div className="text-xl font-semibold tabular-nums text-slate-100">{hrs(sub)}</div>
                <div className="text-[11px] text-slate-500">{area.plan.length} fixes</div>
              </div>
            </div>

            <div className="border-line bg-panel mb-5 rounded-2xl border p-5">
              <p className="leading-relaxed text-slate-200">{area.problem}</p>
              <div className="mt-4 grid gap-4 md:grid-cols-2">
                <div>
                  <div className="mb-1.5 text-[11px] uppercase tracking-wider text-emerald-400/80">
                    Already OK
                  </div>
                  <ul className="space-y-1">
                    {area.good.map((g, i) => (
                      <li key={i} className="flex gap-2 text-sm text-slate-400">
                        <span className="mt-0.5 text-emerald-400">✓</span>
                        {g}
                      </li>
                    ))}
                  </ul>
                </div>
                <div>
                  <div className="mb-1.5 text-[11px] uppercase tracking-wider text-rose-400/80">
                    What's missing
                  </div>
                  <ul className="space-y-1">
                    {area.gaps.map((g, i) => (
                      <li key={i} className="flex gap-2 text-sm text-slate-400">
                        <span
                          className={'mt-1 h-2 w-2 shrink-0 rounded-full ' + TONES[g.tone].dot}
                        ></span>
                        {g.t}
                      </li>
                    ))}
                  </ul>
                </div>
              </div>
            </div>

            {area.extra === 'cost' && <CostDiagram />}

            <h3 className="mb-3 text-xs uppercase tracking-widest text-slate-500">
              The fix · click any item
            </h3>
            <div className="space-y-2.5">
              {area.plan.map((it) => (
                <Card key={it.id} it={it} mode={mode} />
              ))}
            </div>

            {area.decide && (
              <div className="mt-5">
                <h3 className="mb-2 text-xs uppercase tracking-widest text-slate-500">
                  Decide first
                </h3>
                <div className="space-y-2">
                  {area.decide.map((d, i) => (
                    <div key={i} className="border-line bg-panel rounded-xl border px-4 py-3">
                      <div className="text-sm font-medium text-slate-200">{d.t}</div>
                      <div className="mt-0.5 text-sm text-slate-500">{d.d}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        );
      }

      function Overview({ mode, setTab }) {
        return (
          <div className="fade-in">
            <div className="mb-5 rounded-2xl border border-emerald-500/25 bg-emerald-500/5 p-5">
              <div className="mb-2 text-sm font-semibold text-emerald-300">
                First, the good news
              </div>
              <ul className="space-y-1.5">
                {GOOD_NEWS.map((g, i) => (
                  <li key={i} className="flex gap-2 text-sm text-slate-300">
                    <span className="mt-0.5 text-emerald-400">✓</span>
                    {g}
                  </li>
                ))}
              </ul>
            </div>

            <h3 className="mb-3 text-xs uppercase tracking-widest text-slate-500">
              7 issues, worst-first · click to open
            </h3>
            <div className="space-y-2.5">
              {AREAS.map((a, i) => {
                const t = TONES[a.sevTone];
                const sub = areaTotal(a, mode);
                return (
                  <button
                    key={a.id}
                    onClick={() => setTab(a.id)}
                    className={
                      'border-line bg-panel flex w-full items-center gap-3 rounded-xl border px-4 py-3 text-left transition-all hover:border-slate-600'
                    }
                  >
                    <span className="w-5 font-semibold tabular-nums text-slate-600">{i + 1}</span>
                    <span className={'h-2.5 w-2.5 shrink-0 rounded-full ' + t.dot}></span>
                    <div className="min-w-0 flex-1">
                      <div className="flex flex-wrap items-center gap-2">
                        <span className="font-semibold text-slate-100">{a.title}</span>
                        <span className={'rounded-full border px-2 py-0.5 text-[10px] ' + t.chip}>
                          {a.sev}
                        </span>
                      </div>
                      <div className="mt-0.5 text-xs text-slate-500">{a.reach}</div>
                    </div>
                    <div className="shrink-0 text-right">
                      <div className="text-base font-semibold tabular-nums text-slate-100">
                        {hrs(sub)}
                      </div>
                      <div className="text-[11px] text-slate-500">{a.plan.length} fixes</div>
                    </div>
                    <span className="text-slate-600">›</span>
                  </button>
                );
              })}
            </div>

            <p className="mt-5 text-sm text-slate-500">
              Order is by how bad it gets and how likely, not by effort. Crisis safety and voice
              cost are the two to start now; the phone-app items are real but need a stolen phone or
              hostile network, so they come last.
            </p>
          </div>
        );
      }

      /* ─────────── app ─────────── */
      function App() {
        const [mode, setMode] = useState('claude');
        const [tab, setTab] = useState('overview');
        const gTotal = useMemo(() => grand(mode), [mode]);
        const speed = grand('solo') / grand('claude');

        const TABS = [
          { id: 'overview', label: 'Overview' },
          ...AREAS.map((a) => ({ id: a.id, label: a.tab })),
        ];
        const area = AREAS.find((a) => a.id === tab);

        return (
          <div className="mx-auto max-w-5xl px-5 py-8">
            <header className="mb-6">
              <div className="mb-2 flex items-center gap-2 text-xs text-slate-500">
                <span className="h-2 w-2 animate-pulse rounded-full bg-rose-400"></span>
                GUIDED GROWTH · SECURITY REVIEW · TEAM PLAN
              </div>
              <h1 className="text-3xl font-bold tracking-tight text-slate-50">
                What we found, and the plan
              </h1>
              <p className="mt-1 text-slate-400">
                {AREAS.length} issues across the app. Each tab is one issue with what to do about
                it.
              </p>

              <div className="mt-5 flex flex-wrap items-center gap-3">
                <Toggle mode={mode} setMode={setMode} />
                <div className="ml-auto flex flex-wrap gap-2.5">
                  <Metric label="Total work" value={hrs(gTotal)} sub={days(gTotal)} />
                  <Metric
                    label="Fixes"
                    value={fixCount}
                    sub={AREAS.length + ' areas'}
                    accent="text-sky-300"
                  />
                  <Metric
                    label="With Claude"
                    value={speed.toFixed(1) + '×'}
                    sub="less work"
                    accent="text-claude"
                  />
                </div>
              </div>
              <div className="mt-3 text-xs text-slate-500">
                {mode === 'claude' ? (
                  <span>
                    With each dev paired with Claude: about{' '}
                    <b className="text-slate-300">{days(grand('claude'))}</b> of work total, down
                    from <b className="text-slate-300">{days(grand('solo'))}</b>.
                  </span>
                ) : (
                  <span>
                    Devs working alone. Flip to{' '}
                    <span className="text-claude font-medium">Dev + Claude</span> to see the
                    difference.
                  </span>
                )}
              </div>
            </header>

            {/* tab bar */}
            <div className="notab border-line mb-6 flex gap-1.5 overflow-x-auto border-b pb-2">
              {TABS.map((tb) => {
                const a = AREAS.find((x) => x.id === tb.id);
                const active = tab === tb.id;
                const dot = a ? TONES[a.sevTone].dot : 'bg-slate-400';
                return (
                  <button
                    key={tb.id}
                    onClick={() => setTab(tb.id)}
                    className={
                      'flex shrink-0 items-center gap-2 rounded-lg px-3.5 py-2 text-sm font-medium transition-all ' +
                      (active
                        ? 'bg-panel border border-slate-600 text-slate-100'
                        : 'hover:bg-panel/50 border border-transparent text-slate-400 hover:text-slate-200')
                    }
                  >
                    {tb.id !== 'overview' && (
                      <span className={'h-2 w-2 rounded-full ' + dot}></span>
                    )}
                    {tb.label}
                  </button>
                );
              })}
            </div>

            {tab === 'overview' ? (
              <Overview mode={mode} setTab={setTab} />
            ) : (
              <AreaView area={area} mode={mode} />
            )}

            <footer className="border-line mt-10 border-t pt-4 text-xs text-slate-600">
              Times are rough planning numbers (8h/day). The detail inside each card is a starting
              point — devs and their Claudes work out the exact code.
            </footer>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
