stages:
  - sync
  - verify
  - deploy

# Name of the branch that builds and auto-deploys the render to Cloudflare
# Pages. A plain variable (not a CI/CD project variable) so renaming the
# builder branch later is a one-line edit here, or an override via a project
# variable of the same name if the rename needs to ship before this file is
# touched.
variables:
  BUILDER_DEPLOY_BRANCH: 'builder/converge-beat-spec'

# Render guard: runs the render's own static checks (consistency, link
# integrity, rules-registry — see package.json's check:beats, which itself
# runs `node scripts/bible-registry-check.mjs` via check:rules-registry) on
# every push to a render MR/branch. REPORT MODE (allow_failure: true) while
# the render is still being cleaned up (see the 2026-07-10 whole-system
# onboarding QA gate + render-parity-gate handoff) — it runs for real on
# every pipeline and posts a real pass/fail, but does not block merge yet.
# Flip allow_failure to false once a deliberately-wrong beat has been proven
# to fail this job and the current branch passes clean.
render_guards:
  stage: verify
  image: node:20
  rules:
    - if: '$CI_COMMIT_BRANCH'
  interruptible: true
  allow_failure: true
  timeout: 15 minutes
  variables:
    npm_config_cache: '$CI_PROJECT_DIR/.npm'
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  script:
    - npm ci --prefer-offline --no-audit --no-fund
    - node scripts/bible-registry-check.mjs
    - npm run check:render
    - npm run check:links
    - npm run check:beats

# Parity guard: builds the render's published contract (dist-flow/parity.json,
# schema v2 — beat order, identity, opener copy, audio clip ids; see
# scripts/export-render-parity.mjs) and cross-checks it against three
# independently-sourced, app-consumed inputs (scripts/check-app-parity.mjs):
# the app's route-order bundle, its live onboarding-chat opener copy, and the
# audio files actually shipped under public/. This is the "not just a static
# string compare" half of the parity law: a screenId/clip missing on the app
# side is informational (the app's coverage is intentionally partial right
# now), but a value present on BOTH sides that disagrees, or an order
# inversion, fails the job. REPORT MODE (allow_failure: true) for the same
# reason as render_guards — this already fails today on real opener drift
# between the render and the live chat copy (see check-app-parity.mjs's own
# header), which is exactly the kind of divergence it exists to catch. Do not
# flip to blocking until that drift is reconciled and a deliberately-wrong
# change has been proven to fail this job on a clean branch.
render_app_parity:
  stage: verify
  image: node:20
  rules:
    - if: '$CI_COMMIT_BRANCH'
  interruptible: true
  allow_failure: true
  timeout: 15 minutes
  variables:
    npm_config_cache: '$CI_PROJECT_DIR/.npm'
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  script:
    - npm ci --prefer-offline --no-audit --no-fund
    - npm run build:flow
    - npm run check:app-parity

# Builder deploy: on every push to the builder branch, build the render
# (same build:flow that render_guards/render_app_parity already run) and
# publish dist-flow straight to Cloudflare Pages via wrangler direct-upload.
# Runs on the self-hosted oci-arm-shared runner, never on Yair's laptop, and
# Cloudflare Pages direct-upload has no build-minute billing, so this costs
# $0. Gated on check:beats before the build even starts: if the gate fails
# the job fails right there (GitLab CI stops a script list on the first
# failing line) and build:flow / wrangler never run, so a broken builder
# never reaches Cloudflare. CLOUDFLARE_API_TOKEN is a masked CI/CD variable;
# it is NOT protected because this branch isn't a protected branch (a
# protected variable would be invisible to jobs running on it).
deploy_builder:
  stage: deploy
  image: node:20
  rules:
    - if: '$CI_COMMIT_BRANCH == $BUILDER_DEPLOY_BRANCH'
  interruptible: false
  timeout: 15 minutes
  environment:
    name: builder-render
    url: https://gg-onboarding-render.pages.dev
  variables:
    npm_config_cache: '$CI_PROJECT_DIR/.npm'
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  script:
    - npm ci --prefer-offline --no-audit --no-fund
    - npm run check:beats
    - npm run build:flow
    - npx --yes wrangler@4 pages deploy dist-flow --project-name=gg-onboarding-render --branch=main --commit-dirty=true

voice-sync:
  stage: sync
  image: python:3.11
  rules:
    - when: never
  resource_group: voice-sync
  timeout: 5 minutes
  variables:
    PIP_CACHE_DIR: '$CI_PROJECT_DIR/.pip-cache'
    GOOGLE_APPLICATION_CREDENTIALS: '$GCP_SA_KEY'
  cache:
    key: voice-sync-pip
    paths:
      - .pip-cache/
  before_script:
    - python --version
    - pip install --cache-dir "$PIP_CACHE_DIR" -r scripts/voice-sync/requirements.txt
  script:
    - python scripts/voice-sync/seed_contexts.py
