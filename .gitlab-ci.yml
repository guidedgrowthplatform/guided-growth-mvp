image: node:22-alpine

stages:
  - validate
  - test
  - build
  - security
  - android

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/

before_script:
  # --ignore-scripts: skip the husky `prepare` hook. Some CI images set
  #   NODE_ENV=production which makes npm ci skip devDependencies, so the
  #   husky binary is not installed and `sh: husky: not found` crashes the job.
  #   We don't need git hooks in CI anyway.
  # Retry loop: survive transient ECONNRESET from the npm registry.
  - for i in 1 2 3; do npm ci --ignore-scripts && break || (echo "npm ci attempt $i failed, retrying..." && sleep 5); done

lint:
  stage: validate
  allow_failure: true
  script:
    - npm run lint
    - npm run format:check

type-check:
  stage: validate
  script:
    - npm run type-check

test:
  stage: test
  script:
    - npm run test:coverage
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 30 days

build:
  stage: build
  variables:
    # Vite inlines import.meta.env.VITE_* at BUILD time, not runtime.
    # Without this, the Capacitor APK ships with VITE_API_URL=undefined,
    # getApiUrl() falls back to '', and every API call fails with
    # "Could not connect to server" on native (reported by @timothyjm Apr 7).
    # The URL is already public (see capacitor.config.ts allowNavigation),
    # so it is safe to hardcode here.
    VITE_API_URL: 'https://guided-growth-mvp.vercel.app'
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 7 days

security:
  stage: security
  allow_failure: true
  script:
    - npm audit --audit-level=critical

# ───────────────────────────────────────────────
# MVP-26: Automated APK Generation
# Builds a debug APK from the Capacitor Android project
# and uploads it as a downloadable artifact.
# Triggered only on main branch pushes.
# ───────────────────────────────────────────────
build-apk:
  stage: android
  # mingc/android-build-box bundles JDK 8/11/17/21 + Android SDK.
  # Capacitor 6+ requires JDK 21 (compileOptions sourceCompatibility 21).
  image: mingc/android-build-box:latest
  needs:
    - job: build
      artifacts: true
  # Manual trigger only — saves CI compute minutes (project quota is limited).
  # Trigger via GitLab UI (Pipelines → run job) when an APK build is needed.
  # Auto-builds also kick off on git tags (releases).
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true
  before_script:
    # Auto-detect JDK 21 path inside the image. mingc/android-build-box ships
    # multiple JDKs under /usr/lib/jvm/. We pick the one that contains "21"
    # in its directory name. This is more robust than hardcoding the path,
    # which can change between image versions.
    - export JAVA_HOME=$(ls -d /usr/lib/jvm/*21* 2>/dev/null | head -1)
    - 'echo "Resolved JAVA_HOME=$JAVA_HOME"'
    # Entire line wrapped in single quotes so the YAML parser does not
    # interpret the unquoted colon in `"ERROR: ...` as a map key.
    - 'test -x "$JAVA_HOME/bin/javac" || (echo "ERROR JDK 21 not found in image" && ls /usr/lib/jvm/ && exit 1)'
    - export PATH="$JAVA_HOME/bin:$PATH"
    - java -version
    # Install Node.js 22 inside the Android SDK container
    - apt-get update && apt-get install -y curl
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    - apt-get install -y nodejs
    # --ignore-scripts: skip husky `prepare` hook. mingc/android-build-box
    #   sets NODE_ENV=production so npm ci normally skips devDependencies,
    #   leaving the husky binary missing and `sh: husky: not found` crashes
    #   the job. CI does not need git hooks.
    # Retry loop: survive transient ECONNRESET from the npm registry.
    - for i in 1 2 3; do npm ci --ignore-scripts && break || (echo "npm ci attempt $i failed, retrying..." && sleep 5); done
  script:
    # 1. Add android platform (it's gitignored, so always missing in CI).
    #    dist/ is already provided as artifact from the `build` job (needs).
    - '[ -d android ] || npx cap add android'
    # 2. Sync web assets into the Capacitor Android project
    - npx cap copy android
    - npx cap sync android

    # 2. Build debug APK using Gradle wrapper
    - cd android
    - chmod +x gradlew
    - ./gradlew assembleDebug --no-daemon

    # 3. Rename APK with commit SHA for traceability
    - APK_DIR="app/build/outputs/apk/debug"
    - APK_NAME="guided-growth-${CI_COMMIT_SHORT_SHA}.apk"
    - mv "$APK_DIR/app-debug.apk" "$APK_DIR/$APK_NAME"
    - echo "APK built successfully"
    - echo "Download from job artifacts -> $APK_NAME"
  artifacts:
    paths:
      - android/app/build/outputs/apk/debug/*.apk
    expire_in: 30 days
    name: 'guided-growth-apk-${CI_COMMIT_SHORT_SHA}'
  cache:
    key: gradle-cache
    paths:
      - android/.gradle/

# ───────────────────────────────────────────────
# MVP-26: Send APK notification to Mattermost
# Posts a download link to the MVPtesting channel
# after a successful APK build.
# Requires MATTERMOST_WEBHOOK_URL CI/CD variable.
# ───────────────────────────────────────────────
notify-apk:
  stage: android
  image: alpine:latest
  needs:
    - job: build-apk
      artifacts: false
  # Only notify if build-apk actually ran successfully.
  # Since build-apk is now manual on main, this will only trigger when
  # someone explicitly kicks off an APK build.
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
  before_script:
    - apk add --no-cache curl
  script:
    - |
      APK_URL="${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/browse/android/app/build/outputs/apk/debug/"
      COMMIT_MSG=$(echo "$CI_COMMIT_MESSAGE" | head -1)
      curl -s -X POST "$MATTERMOST_WEBHOOK_URL" \
        -H "Content-Type: application/json" \
        -d "{
          \"channel\": \"mvptesting\",
          \"username\": \"GitLab CI\",
          \"icon_emoji\": \":android:\",
          \"text\": \"### :white_check_mark: New APK Ready!\n**Branch:** \`${CI_COMMIT_BRANCH}\`\n**Commit:** \`${CI_COMMIT_SHORT_SHA}\` — ${COMMIT_MSG}\n**Author:** ${GITLAB_USER_NAME}\n\n:arrow_down: [Download APK](${APK_URL})\"
        }"
      echo "Notification sent to Mattermost"
