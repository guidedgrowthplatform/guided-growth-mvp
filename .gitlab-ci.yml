stages:
  - sync
  - verify
  - deploy

# shared so verify/deploy rules can't diverge — needs:[verify] errors if they do.
.branch_push_rules: &branch_push_rules
  - if: '$CI_COMMIT_BRANCH'

voice-sync:
  stage: sync
  image: python:3.11
  rules:
    - when: never
  resource_group: voice-sync
  timeout: 5 minutes
  variables:
    PIP_CACHE_DIR: '$CI_PROJECT_DIR/.pip-cache'
    GOOGLE_APPLICATION_CREDENTIALS: '$GCP_SA_KEY'
  cache:
    key: voice-sync-pip
    paths:
      - .pip-cache/
  before_script:
    - python --version
    - pip install --cache-dir "$PIP_CACHE_DIR" -r scripts/voice-sync/requirements.txt
  script:
    - python scripts/voice-sync/seed_contexts.py

verify:
  stage: verify
  image: node:20
  rules: *branch_push_rules
  interruptible: true
  variables:
    # npm ci wipes node_modules — cache the download cache, not the tree.
    npm_config_cache: '$CI_PROJECT_DIR/.npm'
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  script:
    - npm ci --prefer-offline --no-audit --no-fund
    - npx tsc --noEmit
    - npx vitest run
    - npm run build

# One-off (manual): pull the QA environment from Vercel into the host env file
# that every preview container reads. Uses VERCEL_* CI variables; the token
# never leaves CI. Re-run whenever the QA env changes.
seed_preview_env:
  stage: deploy
  image: node:20
  rules:
    - if: '$CI_COMMIT_BRANCH'
      when: manual
  allow_failure: true
  variables:
    GIT_STRATEGY: none
    VERCEL_ORG_ID: $VERCEL_ORG_ID
    VERCEL_PROJECT_ID: $VERCEL_PROJECT_ID
  script:
    # gg-qa's "production" env is the QA-live app (gg-qa-iota) — the canonical
    # QA values. Its "preview" env is unused/empty. VERCEL_ENV is overridden to
    # "preview" at container run so the app behaves as a preview.
    - npm i -g vercel@latest
    - vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
    - vercel env pull /srv/gg-preview/preview.env --environment=production --token "$VERCEL_TOKEN" --yes
    - printf '\nPUSH_CRON_ENABLED=false\nNODE_ENV=production\n' >> /srv/gg-preview/preview.env
    - chmod 600 /srv/gg-preview/preview.env
    - echo "seeded $(grep -c = /srv/gg-preview/preview.env) vars"
    - 'grep -E "^(SUPABASE_URL|VITE_SUPABASE_URL)=" /srv/gg-preview/preview.env | sed -E "s#(https://[a-z0-9]{6})[a-z0-9]*#\1***#" || true'

# Self-hosted review apps: every branch gets a container on the OCI host at
# https://<slug>.preview.guidedgrowthapp.com. The runner mounts docker.sock and
# /srv/gg-preview (env file + nginx conf.d); a host systemd path unit reloads
# nginx when conf.d changes. Stopping the environment removes everything.
deploy_preview:
  stage: deploy
  image: docker:27-cli
  needs: ['verify']
  rules: *branch_push_rules
  resource_group: preview/$CI_COMMIT_REF_SLUG
  environment:
    name: review/$CI_COMMIT_REF_SLUG
    url: https://$CI_COMMIT_REF_SLUG.preview.guidedgrowthapp.com
    on_stop: stop_preview
    auto_stop_in: 1 week
  variables:
    PREVIEW_HOST: $CI_COMMIT_REF_SLUG.preview.guidedgrowthapp.com
    PREVIEW_ENV_FILE: /srv/gg-preview/preview.env
  script:
    - test -s "$PREVIEW_ENV_FILE" || { echo "preview env not seeded — run the manual seed_preview_env job first"; exit 1; }
    - PORT=$((42000 + $(printf '%s' "$CI_COMMIT_REF_SLUG" | cksum | cut -d' ' -f1) % 1000))
    - echo "deploying $PREVIEW_HOST on 127.0.0.1:$PORT"
    - docker build
      --secret id=envfile,src=$PREVIEW_ENV_FILE
      --build-arg VITE_PUBLIC_WEB_ORIGIN=https://$PREVIEW_HOST
      --build-arg VITE_APP_VERSION=$CI_COMMIT_SHORT_SHA
      --build-arg ENVFILE_SHA=$(sha256sum $PREVIEW_ENV_FILE | cut -d' ' -f1)
      -t gg-preview:$CI_COMMIT_REF_SLUG .
    - docker rm -f gg-preview-$CI_COMMIT_REF_SLUG 2>/dev/null || true
    # Source the env (shell parses quotes/multiline correctly) and pass each var
    # by name — docker --env-file mishandles quoted/multiline values like the
    # FIREBASE_SERVICE_ACCOUNT JSON.
    - |
      set -a; . "$PREVIEW_ENV_FILE"; set +a
      ENVARGS=""
      for k in $(grep -oE '^[A-Za-z_][A-Za-z0-9_]*=' "$PREVIEW_ENV_FILE" | sed 's/=$//'); do
        ENVARGS="$ENVARGS -e $k"
      done
      docker run -d --name gg-preview-$CI_COMMIT_REF_SLUG \
        --restart unless-stopped --memory 512m --cpus 1 \
        -p 127.0.0.1:$PORT:3000 \
        $ENVARGS \
        -e VERCEL_URL=$PREVIEW_HOST -e VERCEL_ENV=preview \
        gg-preview:$CI_COMMIT_REF_SLUG
    - sed -e "s/__HOST__/$PREVIEW_HOST/g" -e "s/__PORT__/$PORT/g" deploy/preview-vhost.template > /srv/gg-preview/conf.d/$CI_COMMIT_REF_SLUG.conf
    - |
      for i in $(seq 1 30); do
        if docker run --rm --network container:gg-preview-$CI_COMMIT_REF_SLUG curlimages/curl -sf http://localhost:3000/healthz >/dev/null 2>&1; then
          echo "healthy"; break
        fi
        [ "$i" = 30 ] && { echo "container never became healthy"; docker logs --tail 50 gg-preview-$CI_COMMIT_REF_SLUG; exit 1; }
        sleep 2
      done
    - |
      if [ -n "$MATTERMOST_WEBHOOK_URL" ]; then
        docker run --rm curlimages/curl -s -X POST "$MATTERMOST_WEBHOOK_URL" -H 'Content-Type: application/json' -d "{\"text\": \":eyes: Preview for \`${CI_COMMIT_REF_NAME}\` by ${GITLAB_USER_NAME}\nhttps://${PREVIEW_HOST}\n> ${CI_COMMIT_TITLE}\"}" || true
      fi

stop_preview:
  stage: deploy
  image: docker:27-cli
  rules:
    - if: '$CI_COMMIT_BRANCH'
      when: manual
  allow_failure: true
  variables:
    GIT_STRATEGY: none
  environment:
    name: review/$CI_COMMIT_REF_SLUG
    action: stop
  script:
    - docker rm -f gg-preview-$CI_COMMIT_REF_SLUG 2>/dev/null || true
    - docker image rm gg-preview:$CI_COMMIT_REF_SLUG 2>/dev/null || true
    - rm -f /srv/gg-preview/conf.d/$CI_COMMIT_REF_SLUG.conf

# gg-qa deploy: deploy only main/stable to the QA-live Vercel env (gg-qa-iota)
# and post the URL to the Deployments channel. No per-branch previews, so
# Vercel stays at exactly two environments (QA-live + Production). Token +
# ids + webhook are CI variables.
deploy_qa_preview:
  stage: deploy
  image: node:20
  needs: ['verify']
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "stable"'
  script:
    - npm i -g vercel@latest
    - |
      DEPLOY_URL=$(vercel deploy --token "$VERCEL_TOKEN" --yes 2>&1 | tee /tmp/vc.log | grep -Eo 'https://[A-Za-z0-9.-]+\.vercel\.app' | tail -n1)
      echo "Deployed: $DEPLOY_URL"
      if [ -z "$DEPLOY_URL" ]; then echo "no deploy URL parsed; full log:"; cat /tmp/vc.log; exit 1; fi
    - |
      if [ "$CI_COMMIT_REF_NAME" = "main" ] || [ "$CI_COMMIT_REF_NAME" = "stable" ]; then
        vercel alias set "$DEPLOY_URL" gg-qa-iota.vercel.app --token "$VERCEL_TOKEN"
        SHOWN_URL="https://gg-qa-iota.vercel.app"
      else
        SHOWN_URL="$DEPLOY_URL"
      fi
      echo "Preview: $SHOWN_URL"
    - |
      case "$CI_COMMIT_REF_NAME" in
        staging|stable|main)
          if [ -n "$MATTERMOST_WEBHOOK_URL" ]; then
            curl -s -X POST "$MATTERMOST_WEBHOOK_URL" -H 'Content-Type: application/json' -d "{\"text\": \"@yairamsel :rocket: \`${CI_COMMIT_REF_NAME}\` deployed by ${GITLAB_USER_NAME}\nStable: ${SHOWN_URL}\nThis build: ${DEPLOY_URL}\n> ${CI_COMMIT_TITLE}\"}" || true
          fi
          ;;
        *)
          echo "Preview built for $CI_COMMIT_REF_NAME (feature branch, no Mattermost notify)"
          ;;
      esac
