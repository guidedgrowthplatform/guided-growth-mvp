image: node:22-alpine

stages:
  - validate
  - test
  - build
  - security
  - android

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/

before_script:
  # Retry npm ci to survive transient network flakes (ECONNRESET from registry)
  - for i in 1 2 3; do npm ci && break || (echo "npm ci attempt $i failed, retrying..." && sleep 5); done

lint:
  stage: validate
  allow_failure: true
  script:
    - npm run lint
    - npm run format:check

type-check:
  stage: validate
  script:
    - npm run type-check

test:
  stage: test
  script:
    - npm run test:coverage
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 30 days

build:
  stage: build
  variables:
    # Vite inlines import.meta.env.VITE_* at BUILD time, not runtime.
    # Without this, the Capacitor APK ships with VITE_API_URL=undefined,
    # getApiUrl() falls back to '', and every API call fails with
    # "Could not connect to server" on native (reported by @timothyjm Apr 7).
    # The URL is already public (see capacitor.config.ts allowNavigation),
    # so it is safe to hardcode here.
    VITE_API_URL: 'https://guided-growth-mvp.vercel.app'
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 7 days

security:
  stage: security
  allow_failure: true
  script:
    - npm audit --audit-level=critical

# ───────────────────────────────────────────────
# MVP-26: Automated APK Generation
# Builds a debug APK from the Capacitor Android project
# and uploads it as a downloadable artifact.
# Triggered only on main branch pushes.
# ───────────────────────────────────────────────
build-apk:
  stage: android
  # mingc/android-build-box bundles JDK 8/11/17/21 + Android SDK.
  # Capacitor 6+ requires JDK 21 (compileOptions sourceCompatibility 21).
  image: mingc/android-build-box:latest
  variables:
    JAVA_HOME: /usr/lib/jvm/java-21-openjdk-amd64
    # Skip husky install in CI — the image sets NODE_ENV=production which
    # makes npm ci skip devDependencies, and the `prepare: husky` script then
    # fails with "husky: not found". HUSKY=0 is the official husky escape hatch.
    HUSKY: '0'
  needs:
    - job: build
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true
  before_script:
    # Install Node.js 22 inside the Android SDK container
    - apt-get update && apt-get install -y curl
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    - apt-get install -y nodejs
    - npm ci
  script:
    # 1. Add android platform (it's gitignored, so always missing in CI).
    #    dist/ is already provided as artifact from the `build` job (needs).
    - '[ -d android ] || npx cap add android'
    # 2. Sync web assets into the Capacitor Android project
    - npx cap copy android
    - npx cap sync android

    # 2. Build debug APK using Gradle wrapper
    - cd android
    - chmod +x gradlew
    - ./gradlew assembleDebug --no-daemon

    # 3. Rename APK with commit SHA for traceability
    - APK_DIR="app/build/outputs/apk/debug"
    - APK_NAME="guided-growth-${CI_COMMIT_SHORT_SHA}.apk"
    - mv "$APK_DIR/app-debug.apk" "$APK_DIR/$APK_NAME"
    - echo "APK built successfully"
    - echo "Download from job artifacts -> $APK_NAME"
  artifacts:
    paths:
      - android/app/build/outputs/apk/debug/*.apk
    expire_in: 30 days
    name: 'guided-growth-apk-${CI_COMMIT_SHORT_SHA}'
  cache:
    key: gradle-cache
    paths:
      - android/.gradle/

# ───────────────────────────────────────────────
# MVP-26: Send APK notification to Mattermost
# Posts a download link to the MVPtesting channel
# after a successful APK build.
# Requires MATTERMOST_WEBHOOK_URL CI/CD variable.
# ───────────────────────────────────────────────
notify-apk:
  stage: android
  image: alpine:latest
  needs:
    - job: build-apk
      artifacts: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - apk add --no-cache curl
  script:
    - |
      APK_URL="${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/browse/android/app/build/outputs/apk/debug/"
      COMMIT_MSG=$(echo "$CI_COMMIT_MESSAGE" | head -1)
      curl -s -X POST "$MATTERMOST_WEBHOOK_URL" \
        -H "Content-Type: application/json" \
        -d "{
          \"channel\": \"mvptesting\",
          \"username\": \"GitLab CI\",
          \"icon_emoji\": \":android:\",
          \"text\": \"### :white_check_mark: New APK Ready!\n**Branch:** \`${CI_COMMIT_BRANCH}\`\n**Commit:** \`${CI_COMMIT_SHORT_SHA}\` — ${COMMIT_MSG}\n**Author:** ${GITLAB_USER_NAME}\n\n:arrow_down: [Download APK](${APK_URL})\"
        }"
      echo "Notification sent to Mattermost"
