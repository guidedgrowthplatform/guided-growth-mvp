stages:
  - sync

voice-sync:
  stage: sync
  image: python:3.11
  # Runs on a GitLab Pipeline Schedule (create one targeting main) and on manual
  # web runs. Does NOT run on every push or on external (Xcode Cloud) pipelines.
  # Requires CI vars: GCP_SA_KEY (file), SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY.
  # See gg-spec/docs/supabase-seed-reenable-runbook.md.
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
  resource_group: voice-sync
  timeout: 5 minutes
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
    GOOGLE_APPLICATION_CREDENTIALS: "$GCP_SA_KEY"
    GOOGLE_SHEET_ID: "1iNEdUm5vqmjk3YGEF1uMwfurcvgVRHykWUeBGHDBqcw"
  cache:
    key: voice-sync-pip
    paths:
      - .pip-cache/
  before_script:
    - python --version
    - pip install --cache-dir "$PIP_CACHE_DIR" -r scripts/voice-sync/requirements.txt
  script:
    - python scripts/voice-sync/seed_contexts.py
