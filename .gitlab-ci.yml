stages:
  - sync
  - verify
  - deploy

# shared so verify/deploy rules can't diverge — needs:[verify] errors if they do.
.branch_push_rules: &branch_push_rules
  - if: '$CI_COMMIT_BRANCH'

voice-sync:
  stage: sync
  image: python:3.11
  rules:
    - when: never
  resource_group: voice-sync
  timeout: 5 minutes
  variables:
    PIP_CACHE_DIR: '$CI_PROJECT_DIR/.pip-cache'
    GOOGLE_APPLICATION_CREDENTIALS: '$GCP_SA_KEY'
  cache:
    key: voice-sync-pip
    paths:
      - .pip-cache/
  before_script:
    - python --version
    - pip install --cache-dir "$PIP_CACHE_DIR" -r scripts/voice-sync/requirements.txt
  script:
    - python scripts/voice-sync/seed_contexts.py

verify:
  stage: verify
  image: node:20
  rules: *branch_push_rules
  interruptible: true
  variables:
    # npm ci wipes node_modules — cache the download cache, not the tree.
    npm_config_cache: '$CI_PROJECT_DIR/.npm'
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  script:
    - npm ci --prefer-offline --no-audit --no-fund
    - npx tsc --noEmit
    - npx vitest run
    - npm run build

# gg-qa preview: deploy every branch push to the gg-qa Vercel project and post
# the URL to the Deployments channel. Token + ids + webhook are CI variables.
deploy_qa_preview:
  stage: deploy
  image: node:20
  needs: ['verify']
  rules: *branch_push_rules
  script:
    - npm i -g vercel@latest
    - |
      DEPLOY_URL=$(vercel deploy --token "$VERCEL_TOKEN" --yes 2>&1 | tee /tmp/vc.log | grep -Eo 'https://[A-Za-z0-9.-]+\.vercel\.app' | tail -n1)
      echo "Deployed: $DEPLOY_URL"
      if [ -z "$DEPLOY_URL" ]; then echo "no deploy URL parsed; full log:"; cat /tmp/vc.log; exit 1; fi
    - |
      if [ "$CI_COMMIT_REF_NAME" = "main" ] || [ "$CI_COMMIT_REF_NAME" = "stable" ]; then
        vercel alias set "$DEPLOY_URL" gg-qa-iota.vercel.app --token "$VERCEL_TOKEN"
        SHOWN_URL="https://gg-qa-iota.vercel.app"
      else
        SHOWN_URL="$DEPLOY_URL"
      fi
      echo "Preview: $SHOWN_URL"
    - |
      case "$CI_COMMIT_REF_NAME" in
        staging|stable|main)
          if [ -n "$MATTERMOST_WEBHOOK_URL" ]; then
            curl -s -X POST "$MATTERMOST_WEBHOOK_URL" -H 'Content-Type: application/json' -d "{\"text\": \"@yairamsel :rocket: \`${CI_COMMIT_REF_NAME}\` deployed by ${GITLAB_USER_NAME}\nStable: ${SHOWN_URL}\nThis build: ${DEPLOY_URL}\n> ${CI_COMMIT_TITLE}\"}" || true
          fi
          ;;
        *)
          echo "Preview built for $CI_COMMIT_REF_NAME (feature branch, no Mattermost notify)"
          ;;
      esac

# gg-engine on Azure Container Apps. Builds the image in ACR (az acr build runs
# in Azure's cloud, so no runner-side docker) and rolls the container app. The
# runtime secrets already live on the app, so this only rebuilds (baking the dev
# VITE_* values) and swaps the image. Manual for now; flip `when: manual` to
# `on_success` once Azure is the chosen QA home. SP creds + VITE values are CI
# variables (AZURE_* and GG_VITE_*).
deploy_azure_qa:
  stage: deploy
  image: mcr.microsoft.com/azure-cli:latest
  needs: ['verify']
  rules:
    - if: '$CI_COMMIT_BRANCH'
      when: manual
      allow_failure: true
  variables:
    RG: gg-engine
    APP: gg-engine
    ACR: ggengineacr66665
    ENGINE_URL: https://gg-engine.kindwave-3cbdee63.eastus2.azurecontainerapps.io
  script:
    - az login --service-principal -u "$AZURE_CLIENT_ID" -p "$AZURE_CLIENT_SECRET" --tenant "$AZURE_TENANT_ID"
    - az account set -s "$AZURE_SUBSCRIPTION_ID"
    - >
      az acr build --registry "$ACR" --image "gg-engine:$CI_COMMIT_SHORT_SHA" -f Dockerfile
      --build-arg SKIP_SPA=0
      --build-arg VITE_SUPABASE_URL="$GG_VITE_SUPABASE_URL"
      --build-arg VITE_SUPABASE_ANON_KEY="$GG_VITE_SUPABASE_ANON_KEY"
      --build-arg VITE_PUBLIC_WEB_ORIGIN="$ENGINE_URL"
      --build-arg VITE_VAPI_PUBLIC_KEY="$GG_VITE_VAPI_PUBLIC_KEY"
      --build-arg VITE_VAPI_ASSISTANT_ID="$GG_VITE_VAPI_ASSISTANT_ID"
      --build-arg VITE_POSTHOG_KEY="$GG_VITE_POSTHOG_KEY"
      --build-arg VITE_POSTHOG_HOST="https://us.i.posthog.com"
      --build-arg VITE_SENTRY_DSN="$GG_VITE_SENTRY_DSN"
      .
    - az containerapp update -n "$APP" -g "$RG" --image "$ACR.azurecr.io/gg-engine:$CI_COMMIT_SHORT_SHA"
    - echo "Deployed $ENGINE_URL"
