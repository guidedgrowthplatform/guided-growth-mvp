# Supabase project config-as-code. Sections below are owned by this repo;
# anything else lives in the dashboard until we bring it under git too.
#
# Apply with: `supabase config push` (CLI v1.180+).

[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token_hook"

# Staging remote — target for `supabase config push --project-ref <ref>`.
# project_id must be a literal ref (env() interpolation unsupported here).
[remotes.staging]
project_id = "ppyouymvnrqxcsllrmsl"
