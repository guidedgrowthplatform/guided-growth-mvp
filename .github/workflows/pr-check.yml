name: PR Check

on:
  push:
    branches-ignore: ['main', 'fix/android-apk-server-access']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        continue-on-error: true
        run: |
          npm run lint
          npm run format:check

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm run test

      - name: Build
        env:
          VITE_API_URL: 'https://guided-growth-mvp.vercel.app'
        run: npm run build
