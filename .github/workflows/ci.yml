name: CI/CD Pipeline

# ─────────────────────────────────────────────────────────────────────────────
# Required secrets for the ios-testflight job (Settings → Secrets → Actions):
#   ASC_KEY_ID                       — App Store Connect API key ID
#   ASC_ISSUER_ID                    — App Store Connect issuer ID (UUID)
#   ASC_KEY_CONTENT                  — base64-encoded .p8 contents
#   MATCH_GIT_URL                    — SSH URL of private match repo (git@…)
#   MATCH_PASSWORD                   — encryption password for match repo
#   MATCH_DEPLOY_KEY                 — SSH private key authorized on match repo
#   VITE_SUPABASE_URL                — baked into the iOS bundle at build time
#   VITE_SUPABASE_ANON_KEY           — baked into the iOS bundle at build time
#   VITE_VAPI_PUBLIC_KEY             — Vapi realtime voice (required for onboarding)
#   VITE_VAPI_ASSISTANT_ID           — Vapi assistant id (required for onboarding)
#   VITE_CARTESIA_AGENT_ID           — voice agent (optional but recommended)
#   VITE_STATE3_ENABLED              — enable Path 3 State 3 Soniox streaming (true/false)
#   VITE_POSTHOG_KEY                 — analytics (optional)
#   VITE_SENTRY_DSN                  — error tracking (optional)
#
# Required secrets for the build-apk job (Android Play Store release):
#   ANDROID_KEYSTORE_BASE64          — base64-encoded upload keystore
#   ANDROID_KEYSTORE_PASSWORD        — keystore password
#   ANDROID_KEY_ALIAS                — signing key alias
#   ANDROID_KEY_PASSWORD             — signing key password
#   SERVICE_ACCOUNT_JSON             — Play Console service account JSON
#   MATTERMOST_ANDROID_CI_WEBHOOK_URL — Mattermost incoming webhook (release notify; optional)
#   FIREBASE_APP_ID                  — Firebase Android app id (App Distribution; optional)
#   FIREBASE_SERVICE_ACCOUNT_JSON    — service account JSON w/ Firebase App Distribution Admin
#
# Repository variables (Settings → Variables → Actions):
#   SKIP_TESTFLIGHT                  — default builds iOS TestFlight; set to 'true' to skip
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: ['main', 'fix/android-apk-server-access']
    tags: ['v*']
  pull_request:
    branches: ['main']
  workflow_dispatch:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify icon bundle is up to date
        run: |
          npm run icons:bundle
          git diff --exit-code src/generated/icon-bundle.json

      - name: Lint
        continue-on-error: true
        run: |
          npm run lint
          npm run format:check

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm run test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Security audit
        continue-on-error: true
        run: npm audit --audit-level=critical

  build:
    runs-on: ubuntu-latest
    needs: validate-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build web
        env:
          VITE_API_URL: 'https://guided-growth-mvp.vercel.app'
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_VAPI_PUBLIC_KEY: ${{ secrets.VITE_VAPI_PUBLIC_KEY }}
          VITE_VAPI_ASSISTANT_ID: ${{ secrets.VITE_VAPI_ASSISTANT_ID }}
          VITE_CARTESIA_AGENT_ID: ${{ secrets.VITE_CARTESIA_AGENT_ID }}
          VITE_STATE3_ENABLED: ${{ secrets.VITE_STATE3_ENABLED }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  build-apk:
    name: Build Android App Bundle (Release)
    runs-on: ubuntu-latest
    needs: build
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    concurrency:
      group: android-release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Download web build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Add Android platform and copy web assets
        run: |
          [ -d android ] || npx cap add android
          npx cap copy android
          npx cap sync android

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > android/app/guidedgrowth.keystore

      # bundleRelease -> AAB for Play; assembleRelease -> APK for Firebase
      # App Distribution (testers can't sideload an AAB). Same signing config.
      - name: Build Release AAB + APK
        working-directory: android
        env:
          KEYSTORE_FILE: 'guidedgrowth.keystore'
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease --no-daemon \
            -PversionCode=${{ github.run_number }} \
            -PversionName=${{ github.ref_name }}

      - name: Upload AAB artifact
        id: upload_aab
        uses: actions/upload-artifact@v4
        with:
          name: guided-growth-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 14

      # Play caps release notes at 500 chars/locale — fail early, not mid-upload.
      - name: Validate Play release notes length
        if: >-
          github.event_name == 'push'
          && startsWith(github.ref, 'refs/tags/v')
        run: |
          f=release-notes/whatsnew-en-US
          [ -f "$f" ] || { echo "::error::Missing $f"; exit 1; }
          len=$(wc -m < "$f" | tr -d ' ')
          echo "Release notes length: $len chars"
          if [ "$len" -gt 500 ]; then
            echo "::error::Play release notes exceed 500 chars ($len). Trim $f."
            exit 1
          fi

      - name: Deploy to Google Play (internal track)
        if: >-
          github.event_name == 'push'
          && startsWith(github.ref, 'refs/tags/v')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: app.guidedgrowth.mvp
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          whatsNewDirectory: release-notes

      # TestFlight-equivalent: emails the tester group an install link per
      # tagged release. Skips silently when FIREBASE_APP_ID is unset so the
      # release never reds before Firebase is configured.
      - name: Distribute to Firebase App Distribution
        if: >-
          github.event_name == 'push'
          && startsWith(github.ref, 'refs/tags/v')
          && env.FIREBASE_APP_ID != ''
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: internal-testers
          file: android/app/build/outputs/apk/release/app-release.apk
          releaseNotes: ${{ github.ref_name }}

      - name: Notify Mattermost (AAB ready)
        if: >-
          success()
          && github.event_name == 'push'
          && startsWith(github.ref, 'refs/tags/v')
          && env.MATTERMOST_ANDROID_CI_WEBHOOK_URL != ''
        continue-on-error: true
        env:
          MATTERMOST_ANDROID_CI_WEBHOOK_URL: ${{ secrets.MATTERMOST_ANDROID_CI_WEBHOOK_URL }}
          ARTIFACT_URL: ${{ steps.upload_aab.outputs.artifact-url }}
        run: |
          short_sha="${GITHUB_SHA::8}"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          commit_msg=$(git log -1 --pretty=%s)
          text=$(printf '**Android Release AAB ready** — `%s`\n> %s\n[Download AAB](%s) · [Workflow run](%s)' \
            "$short_sha" "$commit_msg" "$ARTIFACT_URL" "$run_url")

          payload=$(jq -n \
            --arg username "guided-growth-ci" \
            --arg icon ":robot_face:" \
            --arg text "$text" \
            '{username: $username, icon_emoji: $icon, text: $text}')

          http_code=$(curl -sS -o /tmp/mm_resp -w '%{http_code}' \
            -X POST \
            -H 'Content-Type: application/json' \
            --data "$payload" \
            "$MATTERMOST_ANDROID_CI_WEBHOOK_URL")

          if [ "$http_code" != "200" ]; then
            echo "Mattermost notification failed (HTTP $http_code):" >&2
            cat /tmp/mm_resp >&2
            exit 1
          fi
          echo "Mattermost notified (HTTP 200)."

  ios-testflight:
    name: iOS TestFlight
    # Apple requires apps uploaded to TestFlight / App Store Connect to
    # be built with the iOS 26 SDK or later (Xcode 26+). macos-26 is
    # the GitHub-hosted runner whose default Xcode satisfies that —
    # macos-15 ships Xcode 16.x (iOS 18 SDK) and altool rejects the
    # upload with "SDK version issue (409)".
    runs-on: macos-26
    needs: build
    # Fires on v* tag pushes or manual dispatch by default. To skip iOS on a
    # release (Android-only, save the slow macOS runner) set repo variable
    # SKIP_TESTFLIGHT='true'.
    if: >-
      vars.SKIP_TESTFLIGHT != 'true'
      && (
        github.event_name == 'workflow_dispatch'
        || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      )
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load match SSH deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_DEPLOY_KEY }}

      - name: Trust git hosts (avoid host-key prompt hanging the clone)
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H github.com gitlab.com >> ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Ruby + Bundler cache
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Download web build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Add iOS platform & sync Capacitor
        run: |
          [ -d ios ] || npx cap add ios
          npx cap sync ios
          # ios/ is gitignored + regenerated here; brand the icon/splash at build time from assets/
          npx @capacitor/assets generate --ios --assetPath assets
          node scripts/patch-ios-plist.mjs

      # Fail loud if tester notes are missing — the Fastfile passes nil
      # changelog when the file is absent, silently shipping a build with a
      # blank "What to Test". Mirrors the Android notes check above.
      # TestFlight caps What-to-Test at 4000 chars.
      - name: Validate iOS release notes present
        run: |
          f=release-notes/whatsnew-en-US
          [ -s "$f" ] || { echo "::error::Missing or empty $f — testers need release notes."; exit 1; }
          len=$(wc -m < "$f" | tr -d ' ')
          echo "Release notes length: $len chars"
          if [ "$len" -gt 4000 ]; then
            echo "::error::TestFlight What-to-Test exceeds 4000 chars ($len). Trim $f."
            exit 1
          fi

      - name: Build IPA & upload to TestFlight (fastlane)
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bundle exec fastlane ios beta

      - name: Upload IPA artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/*.ipa
          retention-days: 14
          if-no-files-found: warn
