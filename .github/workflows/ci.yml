name: CI/CD Pipeline

on:
  push:
    branches: ['main', 'fix/android-apk-server-access']
  pull_request:
    branches: ['main']
  workflow_dispatch:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        continue-on-error: true
        run: |
          npm run lint
          npm run format:check

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm run test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Security audit
        continue-on-error: true
        run: npm audit --audit-level=critical

  build:
    runs-on: ubuntu-latest
    needs: validate-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build web
        env:
          VITE_API_URL: 'https://guided-growth-mvp.vercel.app'
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build
    # Can run automatically on push to main or via manual trigger
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Download web build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Add Android platform and copy web assets
        run: |
          [ -d android ] || npx cap add android
          npx cap copy android
          npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          APK_DIR="android/app/build/outputs/apk/debug"
          APK_NAME="guided-growth-${GITHUB_SHA::8}.apk"
          mv "$APK_DIR/app-debug.apk" "$APK_DIR/$APK_NAME"
          echo "APK_PATH=$APK_DIR/$APK_NAME" >> $GITHUB_ENV

      - name: Upload APK artifact
        id: upload_apk
        uses: actions/upload-artifact@v4
        with:
          name: guided-growth-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # Notify the MVPtesting Mattermost channel that a fresh APK is ready.
      - name: Notify Mattermost (APK ready)
        if: >-
          github.event_name == 'push'
          && github.ref == 'refs/heads/main'
          && env.MATTERMOST_WEBHOOK_URL != ''
        env:
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
          ARTIFACT_URL: ${{ steps.upload_apk.outputs.artifact-url }}
        run: |
          short_sha="${GITHUB_SHA::8}"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          commit_msg=$(git log -1 --pretty=%s)
          text=$(printf '**Android APK ready** — `%s`\n> %s\n[Download APK](%s) · [Workflow run](%s)' \
            "$short_sha" "$commit_msg" "$ARTIFACT_URL" "$run_url")

          payload=$(jq -n \
            --arg channel "MVPtesting" \
            --arg username "guided-growth-ci" \
            --arg icon ":robot_face:" \
            --arg text "$text" \
            '{channel: $channel, username: $username, icon_emoji: $icon, text: $text}')

          http_code=$(curl -sS -o /tmp/mm_resp -w '%{http_code}' \
            -X POST \
            -H 'Content-Type: application/json' \
            --data "$payload" \
            "$MATTERMOST_WEBHOOK_URL")

          if [ "$http_code" != "200" ]; then
            echo "Mattermost notification failed (HTTP $http_code):" >&2
            cat /tmp/mm_resp >&2
            exit 1
          fi
          echo "Mattermost notified (HTTP 200)."

  ios-testflight:
    name: iOS TestFlight
    runs-on: macos-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Ruby + Bundler cache
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Download web build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Add iOS platform & sync Capacitor
        run: |
          [ -d ios ] || npx cap add ios
          npx cap copy ios
          npx cap sync ios

      # --- INI DIA SOLUSI OPSI 1 (INSTALL COCOAPODS) ---
      - name: Install CocoaPods dependencies
        working-directory: ios/App
        run: pod install --repo-update

      - name: Build IPA & upload to TestFlight (fastlane)
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: bundle exec fastlane ios beta
