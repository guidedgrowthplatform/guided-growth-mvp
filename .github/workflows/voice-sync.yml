name: voice-sync

on:
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false
        description: 'Read sheet + compute diff, skip all DB writes'
      target:
        type: choice
        default: prod
        options: [prod, staging]
        description: 'Which Supabase project to sync'
  schedule:
    - cron: '0 * * * *'

permissions: {}

jobs:
  sync:
    # schedule has no inputs -> target empty -> prod runs as before
    if: github.event_name == 'schedule' || github.event.inputs.target != 'staging'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: voice-sync
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/voice-sync/requirements.txt

      - name: Install deps
        run: pip install -r scripts/voice-sync/requirements.txt

      - name: Unit tests
        working-directory: scripts/voice-sync
        run: pytest tests/

      - name: Stage GCP service-account file
        env:
          SA_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$SA_JSON" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Run seed_contexts
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          if [ "$DRY_RUN" = "true" ]; then
            python scripts/voice-sync/seed_contexts.py --dry-run | tee -a "$GITHUB_STEP_SUMMARY"
          else
            python scripts/voice-sync/seed_contexts.py | tee -a "$GITHUB_STEP_SUMMARY"
          fi

  sync-staging:
    # dispatch-only; INERT until repo var STAGING_DB_ENABLED='true'
    if: >-
      vars.STAGING_DB_ENABLED == 'true'
      && github.event_name == 'workflow_dispatch'
      && github.event.inputs.target == 'staging'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: voice-sync-staging
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/voice-sync/requirements.txt

      - name: Install deps
        run: pip install -r scripts/voice-sync/requirements.txt

      - name: Unit tests
        working-directory: scripts/voice-sync
        run: pytest tests/

      - name: Stage GCP service-account file
        env:
          SA_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$SA_JSON" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Run seed_contexts (staging)
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          if [ "$DRY_RUN" = "true" ]; then
            python scripts/voice-sync/seed_contexts.py --dry-run | tee -a "$GITHUB_STEP_SUMMARY"
          else
            python scripts/voice-sync/seed_contexts.py | tee -a "$GITHUB_STEP_SUMMARY"
          fi
