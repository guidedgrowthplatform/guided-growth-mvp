name: Mobile Builds

on:
  push:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # Shared: build web assets and upload as artifact
  # ------------------------------------------------------------------
  build-web:
    name: Build Web Assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ------------------------------------------------------------------
  # iOS: Build IPA → TestFlight
  # ------------------------------------------------------------------
  build-ios:
    name: iOS → TestFlight
    needs: build-web
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - run: npm ci

      # Load SSH key to access the private match certificates repo on GitLab
      - name: Set up match deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_DEPLOY_KEY }}

      # Add and sync the iOS platform (ios/ is gitignored, regenerated in CI)
      - name: Capacitor add & sync iOS
        run: |
          npx cap add ios
          npx cap sync ios

      # Auto-increment build number using the GitHub run number
      - name: Set build number
        run: |
          cd ios/App
          agvtool new-version -all ${{ github.run_number }}

      - name: Build & upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bundle exec fastlane ios beta

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ios-ipa
          path: build/ios/GuidedGrowth.ipa
          retention-days: 30

  # ------------------------------------------------------------------
  # Android: Build signed release APK
  # ------------------------------------------------------------------
  build-android:
    name: Android APK
    needs: build-web
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - run: npm ci

      # Add and sync the Android platform (android/ is gitignored, regenerated in CI)
      - name: Capacitor add & sync Android
        run: |
          npx cap add android
          npx cap sync android

      # Generate a signing keystore on the fly using CI secrets
      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore android-release.keystore \
            -alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.ANDROID_KEY_PASSWORD }}" \
            -dname "CN=Guided Growth, O=Guided Growth"

      - name: Build signed APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bundle exec fastlane android build

      - name: Clean up keystore
        if: always()
        run: rm -f android-release.keystore

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/android/GuidedGrowth-release.apk
          retention-days: 30

      # Upload APK to Mattermost channel for testers
      - name: Post APK to Mattermost
        if: success()
        env:
          MM_URL: ${{ secrets.MATTERMOST_URL }}
          MM_TOKEN: ${{ secrets.MATTERMOST_TOKEN }}
          MM_CHANNEL_ID: ${{ secrets.MATTERMOST_CHANNEL_ID }}
        run: |
          # Upload the APK file and get the file ID
          FILE_ID=$(curl -s -X POST \
            "${MM_URL}/api/v4/files" \
            -H "Authorization: Bearer ${MM_TOKEN}" \
            -F "files=@build/android/GuidedGrowth-release.apk" \
            -F "channel_id=${MM_CHANNEL_ID}" \
            | jq -r '.file_infos[0].id')

          # Post message with the attached APK
          curl -s -X POST \
            "${MM_URL}/api/v4/posts" \
            -H "Authorization: Bearer ${MM_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel_id\": \"${MM_CHANNEL_ID}\",
              \"message\": \"### :android: New Android Build (v2.1.0 #${{ github.run_number }})\nAPK attached — download and install to test.\nCommit: ${{ github.sha }}\",
              \"file_ids\": [\"${FILE_ID}\"]
            }"
