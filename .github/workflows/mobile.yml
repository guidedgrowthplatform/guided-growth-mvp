name: Mobile Builds

on:
  push:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # Shared: build web assets and upload as artifact
  # ------------------------------------------------------------------
  build-web:
    name: Build Web Assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ------------------------------------------------------------------
  # iOS: Build IPA → TestFlight
  # ------------------------------------------------------------------
  build-ios:
    name: iOS → TestFlight
    needs: build-web
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - run: npm ci

      # Load SSH key to access the private match certificates repo on GitLab
      - name: Set up match deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_DEPLOY_KEY }}

      # Add and sync the iOS platform (ios/ is gitignored, regenerated in CI)
      - name: Capacitor add & sync iOS
        run: |
          npx cap add ios
          npx cap sync ios

      # Auto-increment build number using the GitHub run number
      - name: Set build number
        run: |
          cd ios/App
          agvtool new-version -all ${{ github.run_number }}

      - name: Build & upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bundle exec fastlane ios beta

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ios-ipa
          path: build/ios/GuidedGrowth.ipa
          retention-days: 30

  # ------------------------------------------------------------------
  # Android: Build signed release APK
  # ------------------------------------------------------------------
  build-android:
    name: Android APK
    needs: build-web
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - run: npm ci

      # Add and sync the Android platform (android/ is gitignored, regenerated in CI)
      - name: Capacitor add & sync Android
        run: |
          npx cap add android
          npx cap sync android

      # Decode signing keystore from base64 secret
      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android-release.keystore

      - name: Build signed APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bundle exec fastlane android build

      - name: Clean up keystore
        if: always()
        run: rm -f android-release.keystore

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/android/GuidedGrowth-release.apk
          retention-days: 30
