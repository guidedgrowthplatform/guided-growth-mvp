name: Generate Android Keystore

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: 'Key alias'
        required: true
        default: 'guided-growth'
      validity_days:
        description: 'Validity in days'
        required: true
        default: '10000'
      cn:
        description: 'Your name (CN)'
        required: true
      org:
        description: 'Organization (O)'
        required: true
        default: 'Guided Growth'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore guided-growth-release.keystore \
            -alias "${{ github.event.inputs.key_alias }}" \
            -keyalg RSA -keysize 2048 \
            -validity ${{ github.event.inputs.validity_days }} \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.ANDROID_KEY_PASSWORD }}" \
            -dname "CN=${{ github.event.inputs.cn }}, O=${{ github.event.inputs.org }}"

      - name: Base64 encode and print
        run: |
          echo "===== COPY EVERYTHING BETWEEN THE MARKERS ====="
          echo "---BEGIN KEYSTORE---"
          base64 -w 0 guided-growth-release.keystore
          echo ""
          echo "---END KEYSTORE---"
          echo "===== Set the above as ANDROID_KEYSTORE_BASE64 in GitHub Secrets ====="

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-keystore
          path: guided-growth-release.keystore
          retention-days: 1
